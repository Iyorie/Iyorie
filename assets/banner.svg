<svg viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Iyorie.reverie — Roblox Developer, Luau and C++">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      .display { font-family: 'Space Grotesk', 'Segoe UI', sans-serif; }
      .mono { font-family: 'JetBrains Mono', 'Consolas', monospace; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#121019"/>
    </linearGradient>
    <radialGradient id="glowA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c6fff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7c6fff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38d9c9" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#38d9c9" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="42"/>
    </filter>
    <clipPath id="round">
      <rect width="900" height="220" rx="14"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect width="900" height="220" fill="url(#bg)"/>
    <circle cx="110" cy="30" r="150" fill="url(#glowA)" filter="url(#blur)"/>
    <circle cx="830" cy="210" r="170" fill="url(#glowB)" filter="url(#blur)"/>

    <!-- titlebar, matches the code-window chrome from the site -->
    <rect x="0" y="0" width="900" height="34" fill="#15141d"/>
    <circle cx="22" cy="17" r="5" fill="#3a3947"/>
    <circle cx="40" cy="17" r="5" fill="#3a3947"/>
    <circle cx="58" cy="17" r="5" fill="#3a3947"/>
    <text x="450" y="21" text-anchor="middle" class="mono" font-size="12" fill="#6f6d7d">profile.card</text>

    <text x="58" y="118" class="mono" font-size="22" fill="#7c6fff">◆</text>
    <text x="90" y="124" class="display" font-size="46" font-weight="700" fill="#f2f1f7">Iyorie<tspan fill="#7c6fff">.</tspan>reverie</text>
    <text x="92" y="158" class="mono" font-size="16" fill="#a6a4b8">Roblox Developer · Luau · C++, on purpose</text>

    <text x="92" y="190" class="mono" font-size="13" fill="#5d5b6c">status: <tspan fill="#38d9c9">luvluvsz.. zzz</tspan><tspan id="cursor" fill="#38d9c9">_</tspan></text>
  </g>

  <animate xlink:href="#cursor" attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
</svg>
